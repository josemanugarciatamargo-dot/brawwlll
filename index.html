<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BrawlLite Web</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --panel-2: #374151;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --ok: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --accent: #60a5fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .title { font-size: 2rem; font-weight: 800; margin: 0 0 8px; }
    .subtitle { color: var(--muted); margin: 0 0 16px; }
    .grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
    .panel {
      background: rgba(31, 41, 55, .92);
      border: 1px solid #4b5563;
      border-radius: 14px;
      padding: 14px;
    }
    .stats { display: grid; gap: 8px; }
    .pill {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 10px;
      font-size: 0.95rem;
    }
    .nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid #6b7280;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.1); }
    .primary { background: #2563eb; border-color: #3b82f6; }
    .danger { background: #b91c1c; border-color: #ef4444; }
    .cards { display: grid; gap: 10px; }
    .card {
      background: #111827;
      border: 1px solid #4b5563;
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .muted { color: var(--muted); }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .danger-t { color: var(--danger); }
    .log {
      margin-top: 12px;
      min-height: 92px;
      max-height: 180px;
      overflow: auto;
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .9rem;
    }
    input, select {
      background: #111827;
      color: var(--text);
      border: 1px solid #6b7280;
      border-radius: 8px;
      padding: 8px;
    }
    .hidden { display: none; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">BrawlLite Web</h1>
    <p class="subtitle">Juego estilo Brawl Stars en un solo archivo HTML (HTML + CSS + JavaScript).</p>

    <div class="grid">
      <aside class="panel">
        <h3>Perfil</h3>
        <div class="stats" id="profileStats"></div>
        <div class="row" style="margin-top: 10px;">
          <button id="saveBtn">Guardar</button>
          <button id="resetBtn" class="danger">Reiniciar partida</button>
        </div>
      </aside>

      <main class="panel">
        <div class="nav">
          <button data-view="play" class="primary">Jugar</button>
          <button data-view="brawlers">Brawlers</button>
          <button data-view="upgrades">Mejoras</button>
          <button data-view="skins">Skins</button>
          <button data-view="shop">Tienda créditos</button>
        </div>

        <section id="play" class="view"></section>
        <section id="brawlers" class="view hidden"></section>
        <section id="upgrades" class="view hidden"></section>
        <section id="skins" class="view hidden"></section>
        <section id="shop" class="view hidden"></section>

        <div id="log" class="log"></div>
      </main>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'brawllite-web-save-v1';
    const MODES = {
      gems: { name: 'Atrapagemas', reward: [6, 13], risk: [3, 10], mult: 1.0 },
      solo: { name: 'Supervivencia Solo', reward: [8, 20], risk: [4, 12], mult: 1.2 },
      brawlball: { name: 'Balón Brawl', reward: [7, 15], risk: [3, 11], mult: 1.1 },
    };
    const CATALOG = {
      Shelly: { rarity: 'Inicial', unlock: 0, skins: [{ n: 'Bandita', c: 0 }, { n: 'Estelar', c: 250 }] },
      Colt: { rarity: 'Común', unlock: 100, skins: [{ n: 'Forajido', c: 0 }, { n: 'Plateado', c: 400 }] },
      Nita: { rarity: 'Común', unlock: 180, skins: [{ n: 'Ursina', c: 0 }, { n: 'Panda', c: 350 }] },
      Bull: { rarity: 'Raro', unlock: 300, skins: [{ n: 'Clásico', c: 0 }, { n: 'Vikingo', c: 500 }] },
      Jessie: { rarity: 'Raro', unlock: 450, skins: [{ n: 'Ingeniera', c: 0 }, { n: 'Dragón', c: 650 }] },
      Poco: { rarity: 'Especial', unlock: 700, skins: [{ n: 'Mariachi', c: 0 }, { n: 'Rockero', c: 800 }] },
      Emz: { rarity: 'Épico', unlock: 1000, skins: [{ n: 'Influencer', c: 0 }, { n: 'Superstar', c: 1000 }] },
    };

    function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function newGame() {
      const nick = prompt('Nombre de jugador', 'Jugador') || 'Jugador';
      const brawlers = {};
      Object.entries(CATALOG).forEach(([name, meta]) => {
        const unlocked = name === 'Shelly';
        brawlers[name] = {
          trophies: 0,
          power: 1,
          unlocked,
          ownedSkins: unlocked ? [meta.skins[0].n] : [],
          activeSkin: unlocked ? meta.skins[0].n : ''
        };
      });
      return { nick, coins: 300, gems: 20, credits: 0, wins: 0, losses: 0, selected: 'Shelly', brawlers };
    }

    function load() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return newGame();
      try { return JSON.parse(raw); } catch { return newGame(); }
    }

    let game = load();

    function totalTrophies() {
      return Object.values(game.brawlers).filter(b => b.unlocked).reduce((a, b) => a + b.trophies, 0);
    }

    function log(msg, cls = '') {
      const node = document.createElement('div');
      if (cls) node.className = cls;
      node.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      const root = document.getElementById('log');
      root.prepend(node);
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(game));
      log('Partida guardada en localStorage.', 'ok');
    }

    function ensureUnlocks() {
      let unlockedNames = [];
      const total = totalTrophies();
      Object.entries(CATALOG).forEach(([name, meta]) => {
        const b = game.brawlers[name];
        if (!b.unlocked && total >= meta.unlock) {
          b.unlocked = true;
          b.ownedSkins.push(meta.skins[0].n);
          b.activeSkin = meta.skins[0].n;
          unlockedNames.push(name);
        }
      });
      if (unlockedNames.length) log(`¡Desbloqueaste ${unlockedNames.join(', ')} por camino de copas!`, 'ok');
    }

    function renderProfile() {
      const cur = game.brawlers[game.selected];
      const data = [
        ['Jugador', game.nick],
        ['Copas totales', totalTrophies()],
        ['Victorias / Derrotas', `${game.wins} / ${game.losses}`],
        ['Monedas', game.coins],
        ['Gemas', game.gems],
        ['Créditos', game.credits],
        ['Brawler activo', `${game.selected} (Poder ${cur.power})`],
        ['Skin activa', cur.activeSkin || '-'],
      ];
      const root = document.getElementById('profileStats');
      root.innerHTML = data.map(([k, v]) => `<div class="pill"><span>${k}</span><strong>${v}</strong></div>`).join('');
    }

    function renderPlay() {
      const root = document.getElementById('play');
      const modeOptions = Object.entries(MODES).map(([k, m]) => `<option value="${k}">${m.name}</option>`).join('');
      root.innerHTML = `
        <h3>Partida contra bots</h3>
        <div class="cards">
          <div class="card">
            <label>Modo de juego</label>
            <select id="modeSel">${modeOptions}</select>
            <button id="playBtn" class="primary">Iniciar partida</button>
          </div>
        </div>
      `;
      document.getElementById('playBtn').onclick = () => {
        const mode = MODES[document.getElementById('modeSel').value];
        const b = game.brawlers[game.selected];
        const botPower = Math.max(1, b.power + pick([-1, 0, 1]));
        const botPressure = Math.random() * 0.5 + 0.8;
        const playerStrength = (b.power + 0.15 * (b.trophies / 100)) * mode.mult;
        const botStrength = (botPower + Math.random() * 0.6) * botPressure;
        const winChance = Math.min(0.85, Math.max(0.15, playerStrength / (playerStrength + botStrength)));

        if (Math.random() < winChance) {
          const cups = rand(...mode.reward);
          const coins = rand(20, 55);
          const credits = rand(4, 12);
          b.trophies += cups;
          game.coins += coins;
          game.credits += credits;
          game.wins += 1;
          log(`Victoria en ${mode.name}: +${cups} copas, +${coins} monedas, +${credits} créditos.`, 'ok');
        } else {
          const loss = Math.min(b.trophies, rand(...mode.risk));
          b.trophies -= loss;
          game.coins += rand(8, 18);
          game.losses += 1;
          log(`Derrota en ${mode.name}: -${loss} copas. Ganaste monedas de participación.`, 'warn');
        }
        ensureUnlocks();
        refreshAll();
      };
    }

    function renderBrawlers() {
      const root = document.getElementById('brawlers');
      root.innerHTML = '<h3>Brawlers</h3><div class="cards">' + Object.entries(CATALOG).map(([name, meta]) => {
        const b = game.brawlers[name];
        const state = b.unlocked ? 'Desbloqueado' : `Bloqueado (${meta.unlock} copas)`;
        return `
          <div class="card">
            <div class="row"><strong>${name}</strong><span class="muted">${meta.rarity}</span></div>
            <div class="row"><span>${state}</span><span>Copas: ${b.trophies}</span></div>
            <div class="row"><span>Poder: ${b.power}</span><span>Skin: ${b.activeSkin || '-'}</span></div>
            <button ${b.unlocked ? '' : 'disabled'} data-select="${name}">${game.selected === name ? 'Seleccionado' : 'Seleccionar'}</button>
          </div>`;
      }).join('') + '</div>';

      root.querySelectorAll('[data-select]').forEach(btn => btn.onclick = () => {
        game.selected = btn.dataset.select;
        log(`Brawler activo: ${game.selected}.`);
        refreshAll();
      });
    }

    function renderUpgrades() {
      const root = document.getElementById('upgrades');
      const unlocked = Object.keys(CATALOG).filter(n => game.brawlers[n].unlocked);
      root.innerHTML = '<h3>Mejoras</h3><div class="cards">' + unlocked.map(name => {
        const b = game.brawlers[name];
        const cost = 120 * b.power;
        return `
          <div class="card">
            <div class="row"><strong>${name}</strong><span>Poder ${b.power}${b.power < 11 ? ` → ${b.power + 1}` : ' (MAX)'}</span></div>
            <div class="row"><span>Costo: ${cost} monedas</span><button ${b.power >= 11 ? 'disabled' : ''} data-up="${name}">Mejorar</button></div>
          </div>`;
      }).join('') + '</div>';
      root.querySelectorAll('[data-up]').forEach(btn => btn.onclick = () => {
        const b = game.brawlers[btn.dataset.up];
        if (b.power >= 11) return;
        const cost = 120 * b.power;
        if (game.coins < cost) return log('No tienes monedas suficientes.', 'danger-t');
        game.coins -= cost;
        b.power += 1;
        log(`${btn.dataset.up} subió a poder ${b.power}.`, 'ok');
        refreshAll();
      });
    }

    function renderSkins() {
      const root = document.getElementById('skins');
      const name = game.selected;
      const b = game.brawlers[name];
      const skins = CATALOG[name].skins;
      root.innerHTML = `
        <h3>Skins de ${name}</h3>
        <div class="cards">
          ${skins.map(s => {
            const owned = b.ownedSkins.includes(s.n);
            return `<div class="card">
              <div class="row"><strong>${s.n}</strong><span>${owned ? 'Comprada' : `${s.c} monedas`}</span></div>
              <div class="row">
                <button ${owned ? '' : 'disabled'} data-equip="${s.n}">${b.activeSkin === s.n ? 'Activa' : 'Equipar'}</button>
                <button ${owned ? 'disabled' : ''} data-buy="${s.n}">Comprar</button>
              </div>
            </div>`;
          }).join('')}
        </div>`;

      root.querySelectorAll('[data-buy]').forEach(btn => btn.onclick = () => {
        const skin = skins.find(s => s.n === btn.dataset.buy);
        if (game.coins < skin.c) return log('Monedas insuficientes para esa skin.', 'danger-t');
        game.coins -= skin.c;
        b.ownedSkins.push(skin.n);
        log(`Compraste skin ${skin.n} para ${name}.`, 'ok');
        refreshAll();
      });

      root.querySelectorAll('[data-equip]').forEach(btn => btn.onclick = () => {
        b.activeSkin = btn.dataset.equip;
        log(`Skin activa de ${name}: ${b.activeSkin}.`);
        refreshAll();
      });
    }

    function renderShop() {
      const root = document.getElementById('shop');
      const locked = Object.keys(CATALOG).filter(n => !game.brawlers[n].unlocked);
      root.innerHTML = '<h3>Tienda de créditos</h3>';
      if (!locked.length) {
        root.innerHTML += '<p class="ok">Ya desbloqueaste todos los brawlers del catálogo.</p>';
        return;
      }
      root.innerHTML += '<div class="cards">' + locked.map(name => {
        const meta = CATALOG[name];
        const cost = Math.max(60, Math.floor(meta.unlock / 3));
        return `<div class="card">
          <div class="row"><strong>${name}</strong><span>${meta.rarity}</span></div>
          <div class="row"><span>${cost} créditos</span><button data-unlock="${name}" data-cost="${cost}">Desbloquear</button></div>
        </div>`;
      }).join('') + '</div>';

      root.querySelectorAll('[data-unlock]').forEach(btn => btn.onclick = () => {
        const name = btn.dataset.unlock;
        const cost = Number(btn.dataset.cost);
        if (game.credits < cost) return log('No tienes créditos suficientes.', 'danger-t');
        game.credits -= cost;
        const b = game.brawlers[name];
        b.unlocked = true;
        b.ownedSkins.push(CATALOG[name].skins[0].n);
        b.activeSkin = CATALOG[name].skins[0].n;
        log(`¡Desbloqueaste a ${name} usando créditos!`, 'ok');
        refreshAll();
      });
    }

    function refreshAll() {
      renderProfile();
      renderPlay();
      renderBrawlers();
      renderUpgrades();
      renderSkins();
      renderShop();
    }

    document.querySelectorAll('[data-view]').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(btn.dataset.view).classList.remove('hidden');
        document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('primary'));
        btn.classList.add('primary');
      };
    });

    document.getElementById('saveBtn').onclick = save;
    document.getElementById('resetBtn').onclick = () => {
      if (!confirm('¿Seguro que quieres borrar tu progreso?')) return;
      localStorage.removeItem(STORAGE_KEY);
      game = newGame();
      log('Partida reiniciada.', 'warn');
      refreshAll();
    };

    refreshAll();
    log('Juego cargado. Puedes empezar una partida.', 'ok');
  </script>
</body>
</html>
